name: Publish API Spec

on:
  push:
    branches:
      - develop
    paths:
      - 'docs/api/v1/**'

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.5.6'

      - name: Bundle API spec
        run: deno task bundle:api

      - name: Push to API docs repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.API_DOCS_TOKEN }}@github.com/Dictionarry-Hub/api.dictionarry.dev.git target
          cp packages/profilarr-api/openapi.json target/openapi.json
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update: spec from ${{ github.sha }}"
          git push
