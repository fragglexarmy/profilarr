library:
  get:
    operationId: getLibrary
    summary: Get Arr instance library
    description: |
      Fetches the movie or series library from an Arr instance.

      Returns a simplified list suitable for selection/matching.
      - For Radarr: Returns movies with id, title, year, and tmdbId
      - For Sonarr: Returns series with id, title, year, tvdbId, and available seasons
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID
    responses:
      '200':
        description: Library items
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/LibraryResponse'
      '400':
        description: Invalid or missing instanceId
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch library
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

releases:
  get:
    operationId: getReleases
    summary: Search for releases
    description: |
      Triggers an interactive search on an Arr instance and returns grouped/deduplicated results.

      For Radarr: Searches for releases for the specified movie.
      For Sonarr: Searches for season pack releases for the specified series and season.

      Results are grouped by title, combining information from multiple indexers.
    tags:
      - Arr
    parameters:
      - name: instanceId
        in: query
        required: true
        schema:
          type: integer
        description: Arr instance ID
      - name: itemId
        in: query
        required: true
        schema:
          type: integer
        description: Movie ID (Radarr) or Series ID (Sonarr)
      - name: season
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Season number for Sonarr searches (defaults to 1)
    responses:
      '200':
        description: Release search results
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ReleasesResponse'
      '400':
        description: Invalid or missing parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to fetch releases
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'

cleanup:
  post:
    operationId: arrCleanup
    summary: Scan or execute cleanup of stale configs
    description: |
      Detects and deletes stale namespace-suffixed custom formats and quality profiles
      from an Arr instance that are no longer in the current sync selections.

      Two actions are supported via the `action` field in the request body:
      - `scan`: Scans for stale items and returns what would be deleted.
      - `execute`: Deletes the stale items from a previous scan result.

      Quality profiles assigned to media will be skipped with a warning (Arr returns HTTP 500 "in use").
    tags:
      - Arr
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '../schemas/arr.yaml#/CleanupScanRequest'
              - $ref: '../schemas/arr.yaml#/CleanupExecuteRequest'
    responses:
      '200':
        description: Scan or delete result
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../schemas/arr.yaml#/CleanupScanResult'
                - $ref: '../schemas/arr.yaml#/CleanupDeleteResult'
      '400':
        description: Invalid request (missing instanceId, invalid action)
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '404':
        description: Instance not found
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
      '500':
        description: Failed to perform cleanup
        content:
          application/json:
            schema:
              $ref: '../schemas/arr.yaml#/ErrorResponse'
