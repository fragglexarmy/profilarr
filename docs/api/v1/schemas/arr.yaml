ArrType:
  type: string
  enum:
    - radarr
    - sonarr
  description: Type of Arr instance

# Shared types
ArrImage:
  type: object
  properties:
    coverType:
      type: string
      description: Image type (poster, fanart, banner, clearlogo)
    url:
      type: string
      description: Local image URL (relative to Arr instance)
    remoteUrl:
      type: string
      description: Remote CDN URL (TMDB/TVDB)

ArrMediaInfo:
  type: object
  properties:
    audioCodec:
      type: string
    audioChannels:
      type: number
    videoCodec:
      type: string
    videoBitDepth:
      type: integer
    videoDynamicRange:
      type: string
    videoDynamicRangeType:
      type: string
    resolution:
      type: string
    subtitles:
      type: string

CustomFormatRef:
  type: object
  required:
    - id
    - name
  properties:
    id:
      type: integer
      description: Custom format ID
    name:
      type: string
      description: Custom format name

ScoreBreakdownItem:
  type: object
  required:
    - name
    - score
  properties:
    name:
      type: string
      description: Custom format name
    score:
      type: integer
      description: Score assigned by the quality profile

ProfileByDatabase:
  type: object
  required:
    - databaseId
    - databaseName
    - profiles
  properties:
    databaseId:
      type: integer
      description: Profilarr database ID
    databaseName:
      type: string
      description: Profilarr database name
    profiles:
      type: array
      items:
        type: string
      description: Quality profile names in this database

# Library endpoint types - Radarr
RadarrLibraryItem:
  type: object
  required:
    - id
    - title
    - hasFile
    - monitored
    - qualityProfileId
    - qualityProfileName
    - isProfilarrProfile
    - customFormatScore
    - cutoffScore
    - minScore
    - progress
    - cutoffMet
    - customFormats
    - scoreBreakdown
  properties:
    id:
      type: integer
      description: Radarr movie ID
    tmdbId:
      type: integer
      description: TMDB ID
    imdbId:
      type: string
      description: IMDB ID
    title:
      type: string
      description: Movie title
    year:
      type: integer
      description: Release year
    qualityProfileId:
      type: integer
      description: Assigned quality profile ID
    qualityProfileName:
      type: string
      description: Assigned quality profile name
    hasFile:
      type: boolean
      description: Whether the movie has a downloaded file
    monitored:
      type: boolean
      description: Whether the movie is monitored
    status:
      type: string
      description: Movie status (released, announced, inCinemas)
    dateAdded:
      type: string
      format: date-time
      description: When the movie was added
    popularity:
      type: number
      description: TMDB popularity score
    sizeOnDisk:
      type: integer
      description: File size in bytes
    runtime:
      type: integer
      description: Runtime in minutes
    certification:
      type: string
      description: Content rating (e.g. R, PG-13)
    genres:
      type: array
      items:
        type: string
      description: Genre list
    studio:
      type: string
      description: Production studio
    ratings:
      type: object
      description: Ratings from various sources
      properties:
        imdb:
          $ref: '#/RatingSource'
        tmdb:
          $ref: '#/RatingSource'
        metacritic:
          $ref: '#/RatingSource'
        rottenTomatoes:
          $ref: '#/RatingSource'
        trakt:
          $ref: '#/RatingSource'
    images:
      type: array
      items:
        $ref: '#/ArrImage'
      description: Poster and fanart images
    collection:
      type: object
      properties:
        title:
          type: string
        tmdbId:
          type: integer
    originalLanguage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    qualityName:
      type: string
      nullable: true
      description: Quality of the downloaded file (null if no file)
    fileName:
      type: string
      nullable: true
      description: File name of the downloaded file (null if no file)
    releaseGroup:
      type: string
      description: Release group name from the file
    edition:
      type: string
      description: Edition name (e.g. Final Cut, Director's Cut)
    languages:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
      description: Languages in the file
    mediaInfo:
      $ref: '#/ArrMediaInfo'
    customFormats:
      type: array
      items:
        $ref: '#/CustomFormatRef'
      description: Custom formats matched on the file
    customFormatScore:
      type: integer
      description: Total custom format score
    scoreBreakdown:
      type: array
      items:
        $ref: '#/ScoreBreakdownItem'
      description: Per-custom-format score breakdown
    cutoffScore:
      type: integer
      description: Profile cutoff score threshold
    minScore:
      type: integer
      description: Profile minimum score threshold
    progress:
      type: number
      description: Score progress toward cutoff (0-1+)
    cutoffMet:
      type: boolean
      description: Whether the cutoff score has been met
    isProfilarrProfile:
      type: boolean
      description: Whether the profile is managed by Profilarr

# Library endpoint types - Sonarr
SonarrSeasonItem:
  type: object
  required:
    - seasonNumber
    - monitored
    - episodeCount
    - episodeFileCount
    - totalEpisodeCount
    - sizeOnDisk
    - percentOfEpisodes
  properties:
    seasonNumber:
      type: integer
      description: Season number (0 = specials)
    monitored:
      type: boolean
      description: Whether this season is monitored
    episodeCount:
      type: integer
      description: Number of aired episodes
    episodeFileCount:
      type: integer
      description: Number of episodes with files
    totalEpisodeCount:
      type: integer
      description: Total episodes including unaired
    sizeOnDisk:
      type: integer
      description: Total size of episode files in bytes
    percentOfEpisodes:
      type: number
      description: Percentage of episodes with files (0-100)

SonarrLibraryItem:
  type: object
  required:
    - id
    - title
    - qualityProfileId
    - qualityProfileName
    - monitored
    - seasonCount
    - episodeCount
    - episodeFileCount
    - totalEpisodeCount
    - sizeOnDisk
    - percentOfEpisodes
    - seasons
    - isProfilarrProfile
  properties:
    id:
      type: integer
      description: Sonarr series ID
    tvdbId:
      type: integer
      description: TVDB ID
    title:
      type: string
      description: Series title
    titleSlug:
      type: string
      description: URL-friendly slug from Sonarr (used for series page links)
    year:
      type: integer
      description: First air year
    qualityProfileId:
      type: integer
      description: Assigned quality profile ID
    qualityProfileName:
      type: string
      description: Assigned quality profile name
    status:
      type: string
      description: Series status (continuing, ended, etc.)
    monitored:
      type: boolean
      description: Whether the series is monitored
    seasonCount:
      type: integer
      description: Number of seasons
    episodeCount:
      type: integer
      description: Number of aired episodes
    episodeFileCount:
      type: integer
      description: Number of episodes with files
    totalEpisodeCount:
      type: integer
      description: Total episodes including unaired
    sizeOnDisk:
      type: integer
      description: Total size of all episode files in bytes
    percentOfEpisodes:
      type: number
      description: Percentage of episodes with files (0-100)
    dateAdded:
      type: string
      format: date-time
      description: When the series was added
    seasons:
      type: array
      items:
        $ref: '#/SonarrSeasonItem'
      description: Season-level statistics
    isProfilarrProfile:
      type: boolean
      description: Whether the profile is managed by Profilarr
    network:
      type: string
      description: TV network (e.g. HBO, CBS)
    seriesType:
      type: string
      description: Series type (standard, daily, anime)
    certification:
      type: string
      description: Content rating (e.g. TV-MA, TV-PG)
    genres:
      type: array
      items:
        type: string
      description: Genre list
    runtime:
      type: integer
      description: Episode runtime in minutes
    ratings:
      type: object
      properties:
        votes:
          type: integer
        value:
          type: number
    images:
      type: array
      items:
        $ref: '#/ArrImage'
      description: Poster, banner, fanart images
    originalLanguage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    firstAired:
      type: string
      format: date-time
      description: First air date
    lastAired:
      type: string
      format: date-time
      description: Last air date
    imdbId:
      type: string
      description: IMDB ID

SonarrEpisodeItem:
  type: object
  required:
    - id
    - episodeNumber
    - seasonNumber
    - title
    - hasFile
    - monitored
    - customFormatScore
    - cutoffScore
    - progress
    - cutoffMet
    - customFormats
    - scoreBreakdown
  properties:
    id:
      type: integer
      description: Sonarr episode ID
    episodeNumber:
      type: integer
      description: Episode number within the season
    seasonNumber:
      type: integer
      description: Season number
    title:
      type: string
      description: Episode title
    hasFile:
      type: boolean
      description: Whether the episode has a downloaded file
    monitored:
      type: boolean
      description: Whether the episode is monitored
    qualityName:
      type: string
      description: Quality of the downloaded file
    fileName:
      type: string
      description: File name of the downloaded file
    size:
      type: integer
      description: File size in bytes
    customFormats:
      type: array
      items:
        $ref: '#/CustomFormatRef'
      description: Custom formats matched on the file
    customFormatScore:
      type: integer
      description: Total custom format score
    scoreBreakdown:
      type: array
      items:
        $ref: '#/ScoreBreakdownItem'
      description: Per-custom-format score breakdown
    cutoffScore:
      type: integer
      description: Profile cutoff score threshold
    progress:
      type: number
      description: Score progress toward cutoff (0-1+)
    cutoffMet:
      type: boolean
      description: Whether the cutoff score has been met
    releaseGroup:
      type: string
      description: Release group name from the file
    languages:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
      description: Languages in the file
    mediaInfo:
      $ref: '#/ArrMediaInfo'

# Library response wrappers
LibraryRadarrResponse:
  type: object
  required:
    - type
    - items
    - profilesByDatabase
  properties:
    type:
      type: string
      enum:
        - radarr
    items:
      type: array
      items:
        $ref: '#/RadarrLibraryItem'
    profilesByDatabase:
      type: array
      items:
        $ref: '#/ProfileByDatabase'

LibrarySonarrResponse:
  type: object
  required:
    - type
    - items
    - profilesByDatabase
  properties:
    type:
      type: string
      enum:
        - sonarr
    items:
      type: array
      items:
        $ref: '#/SonarrLibraryItem'
    profilesByDatabase:
      type: array
      items:
        $ref: '#/ProfileByDatabase'

LibraryResponse:
  oneOf:
    - $ref: '#/LibraryRadarrResponse'
    - $ref: '#/LibrarySonarrResponse'
  description: Library response varies by instance type

EpisodesResponse:
  type: object
  required:
    - episodes
  properties:
    episodes:
      type: array
      items:
        $ref: '#/SonarrEpisodeItem'
      description: Episode details with quality and score data

CacheInvalidatedResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean
      description: Whether the cache was invalidated

# Releases endpoint types
GroupedRelease:
  type: object
  required:
    - title
    - size
    - languages
    - indexers
    - flags
  properties:
    title:
      type: string
      description: Release title
    size:
      type: integer
      description: Release size in bytes
    languages:
      type: array
      items:
        type: string
      description: Languages detected in the release
    indexers:
      type: array
      items:
        type: string
      description: Indexers where this release was found
    flags:
      type: array
      items:
        type: string
      description: Release flags (e.g., freeleech, internal)

ReleasesResponse:
  type: object
  required:
    - type
    - rawCount
    - releases
  properties:
    type:
      $ref: '#/ArrType'
    rawCount:
      type: integer
      description: Total number of raw releases before grouping
    releases:
      type: array
      items:
        $ref: '#/GroupedRelease'
      description: Grouped and deduplicated releases

ErrorResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string
      description: Error message

# Cleanup endpoint types
StaleItem:
  type: object
  required:
    - id
    - name
    - strippedName
  properties:
    id:
      type: integer
      description: Arr entity ID
    name:
      type: string
      description: Full name including namespace suffix
    strippedName:
      type: string
      description: Name with namespace suffix removed

CleanupScanRequest:
  type: object
  required:
    - instanceId
    - action
  properties:
    instanceId:
      type: integer
      description: Arr instance ID
    action:
      type: string
      enum:
        - scan

CleanupExecuteRequest:
  type: object
  required:
    - instanceId
    - action
    - scanResult
  properties:
    instanceId:
      type: integer
      description: Arr instance ID
    action:
      type: string
      enum:
        - execute
    scanResult:
      $ref: '#/CleanupScanResult'

CleanupScanResult:
  type: object
  required:
    - staleCustomFormats
    - staleQualityProfiles
  properties:
    staleCustomFormats:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Custom formats that are no longer in sync selections
    staleQualityProfiles:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Quality profiles that are no longer in sync selections

SkippedItem:
  type: object
  required:
    - item
    - reason
  properties:
    item:
      $ref: '#/StaleItem'
    reason:
      type: string
      description: Why the item was skipped (e.g. "Profile is assigned to media")

CleanupDeleteResult:
  type: object
  required:
    - deletedCustomFormats
    - deletedQualityProfiles
    - skippedQualityProfiles
  properties:
    deletedCustomFormats:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Custom formats that were successfully deleted
    deletedQualityProfiles:
      type: array
      items:
        $ref: '#/StaleItem'
      description: Quality profiles that were successfully deleted
    skippedQualityProfiles:
      type: array
      items:
        $ref: '#/SkippedItem'
      description: Quality profiles that were skipped (assigned to media)

# Sync entity endpoint types
SyncEntityRequest:
  type: object
  required:
    - instanceId
    - databaseId
    - entityName
    - entityType
  properties:
    instanceId:
      type: integer
      description: Arr instance ID
    databaseId:
      type: integer
      description: PCD database ID
    entityName:
      type: string
      description: Name of the entity to sync
    entityType:
      type: string
      enum:
        - qualityProfile
        - customFormat
        - regularExpression
        - delayProfile
        - naming
        - qualityDefinitions
        - mediaSettings
      description: >
        Type of entity being synced. Determines which sync function runs and which
        cooldown group applies (qualityProfiles, delayProfiles, or mediaManagement).

SyncEntitySuccessResponse:
  type: object
  required:
    - success
  properties:
    success:
      type: boolean
      enum:
        - true

SyncEntityCooldownResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string
      description: Cooldown or in-progress message
    retryAfter:
      type: integer
      description: Seconds until cooldown expires

RatingSource:
  type: object
  properties:
    votes:
      type: integer
    value:
      type: number
