ComponentStatus:
  type: string
  enum:
    - healthy
    - degraded
    - unhealthy
  description: Individual component health status

HealthStatus:
  type: string
  enum:
    - healthy
    - degraded
    - unhealthy
  description: Overall health status

ErrorResponse:
  type: object
  required:
    - error
  properties:
    error:
      type: string
      description: Error message
      example: Unauthorized
