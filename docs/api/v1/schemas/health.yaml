# Public health check — minimal, no sensitive info
HealthCheckResponse:
  type: object
  required:
    - status
    - timestamp
  properties:
    status:
      $ref: './common.yaml#/HealthStatus'
    timestamp:
      type: string
      format: date-time
      description: Current server time

# Authenticated diagnostics — full component details
HealthDiagnosticsResponse:
  type: object
  required:
    - status
    - timestamp
    - version
    - uptime
    - components
  properties:
    status:
      $ref: './common.yaml#/HealthStatus'
    timestamp:
      type: string
      format: date-time
      description: Current server time
    version:
      type: string
      description: Application version
    uptime:
      type: integer
      description: Server uptime in seconds
    components:
      type: object
      required:
        - sqlite
        - repos
        - jobs
        - backups
        - logs
      properties:
        sqlite:
          $ref: '#/SqliteHealth'
        repos:
          $ref: '#/ReposHealth'
        jobs:
          $ref: '#/JobsHealth'
        backups:
          $ref: '#/BackupsHealth'
        logs:
          $ref: '#/LogsHealth'

SqliteHealth:
  type: object
  required:
    - status
    - responseTimeMs
    - migration
  properties:
    status:
      $ref: './common.yaml#/ComponentStatus'
    responseTimeMs:
      type: number
      description: Database query response time in milliseconds
    migration:
      type: integer
      description: Current migration version
    message:
      type: string
      description: Error message if unhealthy

ReposHealth:
  type: object
  required:
    - status
  properties:
    status:
      $ref: './common.yaml#/ComponentStatus'
    message:
      type: string
      description: Additional status information
    # Verbose fields
    total:
      type: integer
      description: Total number of PCD repos configured (verbose only)
    enabled:
      type: integer
      description: Number of enabled repos (verbose only)
    cached:
      type: integer
      description: Number of repos with compiled cache (verbose only)
    disabled:
      type: integer
      description: Number of disabled repos (verbose only)

JobsHealth:
  type: object
  required:
    - status
  properties:
    status:
      $ref: './common.yaml#/ComponentStatus'
    message:
      type: string
      description: Additional status information
    # Verbose fields
    oldestQueued:
      type: string
      format: date-time
      nullable: true
      description: Oldest queued job run_at timestamp (verbose only)

BackupsHealth:
  type: object
  required:
    - status
    - enabled
  properties:
    status:
      $ref: './common.yaml#/ComponentStatus'
    enabled:
      type: boolean
      description: Whether backups are enabled
    message:
      type: string
      description: Additional status information
    # Verbose fields
    lastBackup:
      type: string
      format: date-time
      nullable: true
      description: Timestamp of last backup (verbose only)
    count:
      type: integer
      description: Number of backup files (verbose only)
    totalSize:
      type: string
      description: Human-readable total size of all backups (verbose only)
    retentionDays:
      type: integer
      description: Configured retention period in days (verbose only)

LogsHealth:
  type: object
  required:
    - status
  properties:
    status:
      $ref: './common.yaml#/ComponentStatus'
    message:
      type: string
      description: Additional status information
    # Verbose fields
    totalSize:
      type: string
      description: Human-readable total size of log files (verbose only)
    fileCount:
      type: integer
      description: Number of log files (verbose only)
    oldestLog:
      type: string
      format: date
      nullable: true
      description: Date of oldest log file (verbose only)
    newestLog:
      type: string
      format: date
      nullable: true
      description: Date of newest log file (verbose only)
